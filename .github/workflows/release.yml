name: Release Nutmeg

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        env:
          HT_CONSUMER_KEY: ${{ secrets.HT_CONSUMER_KEY }}
          HT_CONSUMER_SECRET: ${{ secrets.HT_CONSUMER_SECRET }}
        with:
          bundle: nutmeg.flatpak
          manifest-path: org.gnome.Nutmeg.json
          cache-key: flatpak-builder-${{ github.sha }}
          build-args: "--env=HT_CONSUMER_KEY=${{ env.HT_CONSUMER_KEY }} --env=HT_CONSUMER_SECRET=${{ env.HT_CONSUMER_SECRET }}"

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutmeg-linux-flatpak
          path: |
             nutmeg.flatpak

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: brew install gtk4 libadwaita gettext

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS Release
        env:
          HT_CONSUMER_KEY: ${{ secrets.HT_CONSUMER_KEY }}
          HT_CONSUMER_SECRET: ${{ secrets.HT_CONSUMER_SECRET }}
        run: cargo build --release

      - name: Package macOS App
        run: |
          mkdir -p Nutmeg.app/Contents/MacOS
          cp target/release/nutmeg Nutmeg.app/Contents/MacOS/
          # In a real app, Info.plist and resources should be copied here as well.
          zip -r nutmeg-macos.zip Nutmeg.app/

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutmeg-macos
          path: nutmeg-macos.zip

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gcc

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Windows Release
        env:
          HT_CONSUMER_KEY: ${{ secrets.HT_CONSUMER_KEY }}
          HT_CONSUMER_SECRET: ${{ secrets.HT_CONSUMER_SECRET }}
        run: cargo build --release

      - name: Package Windows App
        run: |
          mkdir nutmeg-release
          cp target/release/nutmeg.exe nutmeg-release/
          # Copy necessary GTK dlls (example logic; standard tools like windeployqt exist for qt, for gtk we usually grab from /mingw64/bin)
          # cp /mingw64/bin/*.dll nutmeg-release/ || true
          # Compress
          # In msys2 zip must be installed; if not, use 7z or powershell Compress-Archive
          cd nutmeg-release && tar -czvf ../nutmeg-windows.tar.gz *

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutmeg-windows
          path: nutmeg-windows.tar.gz

  create-release:
    needs: [build-flatpak, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nutmeg-linux-flatpak/*
            artifacts/nutmeg-macos/*
            artifacts/nutmeg-windows/*
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
